<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/spectrum.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0e13" />

    <!-- SEO -->
    <title>Spectrum — the free online & party guessing game</title>
    <meta name="description" content="Spectrum is a free social party game: the Master gives a one-word clue and everyone guesses where it lands between two opposites. Play pass-and-play on one phone or online with friends — no app, no account, no sign-up." />
    <meta name="keywords" content="spectrum game, party game, guessing game, online party game, wavelength game, free browser game, word game, friends game" />
    <meta name="author" content="FrenchFive" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://frenchfive.github.io/Spectrum_Game/" />

    <!-- Open Graph (Facebook, Discord, iMessage, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Spectrum" />
    <meta property="og:title" content="Spectrum — the free online & party guessing game" />
    <meta property="og:description" content="One Master gives a one-word clue; everyone drags the needle to guess where it lands between two opposites. Free, no account, play on one phone or online with friends." />
    <meta property="og:url" content="https://frenchfive.github.io/Spectrum_Game/" />
    <meta property="og:image" content="https://frenchfive.github.io/Spectrum_Game/spectrum.svg" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Spectrum — the free online & party guessing game" />
    <meta name="twitter:description" content="Read the Master's mind: guess where a one-word clue lands between two opposites. Free, no sign-up, play with friends." />
    <meta name="twitter:image" content="https://frenchfive.github.io/Spectrum_Game/spectrum.svg" />

    <!-- Structured data: helps Google understand this is a playable game -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "VideoGame",
      "name": "Spectrum",
      "alternateName": "Spectrum — read the master's mind",
      "url": "https://frenchfive.github.io/Spectrum_Game/",
      "image": "https://frenchfive.github.io/Spectrum_Game/spectrum.svg",
      "description": "A free social party guessing game. One Master gives a one-word clue and everyone guesses where it lands between two opposites. Play pass-and-play on one device or online with friends — no account needed.",
      "applicationCategory": "Game",
      "genre": ["Party game", "Guessing game", "Word game"],
      "operatingSystem": "Web browser",
      "playMode": ["CoOp", "MultiPlayer"],
      "author": { "@type": "Person", "name": "FrenchFive" },
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
    }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
